services:
  - type: web
    name: moneymaker-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_PAPER_API_KEY
        sync: false
      - key: ALPACA_PAPER_SECRET_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false

  - type: web
    name: moneymaker-ui
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-ui.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: API_BASE_URL
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false

  # Always-on watcher — runs continuously so the next-day exit window and
  # intraday signals are caught reliably (GitHub Actions cron drops most ticks).
  # Runs in --db-only mode: it trades congressional disclosures (congress_trades),
  # processes the signal queue, and closes positions at their exit horizon without
  # needing Twitter cookies. Drop --db-only once twitter_cookies.json is supplied
  # to also fetch live tweets.
  # Requires at least the Starter plan on Render (free workers spin down).
  - type: worker
    name: tweet-watcher
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python3 watch.py --db-only
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_PAPER_API_KEY
        sync: false
      - key: ALPACA_PAPER_SECRET_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
