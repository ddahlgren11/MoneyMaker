name: Weekly Relationship Registry Refresh

on:
  schedule:
    - cron: '0 14 * * 1'   # Monday 9:00am ET (14:00 UTC) — after daily retrain finishes (~30 min buffer)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  refresh:
    name: Recompute causal relationship scores
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-watcher.txt

      - name: Install dependencies
        run: pip install -r requirements-watcher.txt

      - name: Refresh relationship registry
        run: python3 relationship_analysis.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
