<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyMaker Active Controller</title>
    <!-- Bootstrap 5 Dark Theme -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-dark-5@1.1.3/dist/css/bootstrap-dark.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            padding-top: 40px;
        }
        .container {
            max-width: 900px;
        }
        .card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .card-header {
            background-color: #2c2c2c;
            border-bottom: 1px solid #444;
            font-weight: bold;
        }
        .form-control {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
        }
        .form-control:focus {
            background-color: #333;
            color: #fff;
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        .table {
            color: #e0e0e0;
        }
        .table-dark {
            background-color: #1e1e1e;
        }
        .table-striped>tbody>tr:nth-of-type(odd)>* {
            color: #e0e0e0;
            background-color: rgba(255, 255, 255, 0.05);
        }
        .table-hover>tbody>tr:hover>* {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.1);
        }
        #resultsContainer {
            margin-top: 30px;
            overflow-x: auto;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #0d6efd;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">MoneyMaker Data Fetcher</h1>

        <div class="card">
            <div class="card-header">
                Data Query Parameters
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="ceoHandle" class="form-label">CEO Twitter Handle</label>
                        <input type="text" class="form-control" id="ceoHandle" placeholder="e.g. elonmusk">
                    </div>
                    <div class="col-md-6">
                        <label for="stockTicker" class="form-label">Stock Ticker</label>
                        <input type="text" class="form-control" id="stockTicker" placeholder="e.g. TSLA">
                    </div>
                </div>

                <div class="d-flex justify-content-center mt-4 gap-3">
                    <button class="btn btn-primary" onclick="fetchTweets()">Pull Tweets</button>
                    <button class="btn btn-success" onclick="fetchStocks()">Pull Stock Data</button>
                    <button class="btn btn-warning" onclick="fetchMerged()">Pull Merged Data</button>
                    <div id="loading" class="loader"></div>
                </div>
            </div>
        </div>

        <div id="resultsContainer">
            <!-- Results table will be rendered here -->
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'inline-block' : 'none';
        }

        // Helper function to escape HTML to prevent XSS
        function escapeHtml(unsafe) {
            if (unsafe === null || unsafe === undefined) return '-';
            if (typeof unsafe === 'number') return unsafe;
            return unsafe
                 .toString()
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        function displayError(message) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = `<div class="alert alert-danger">${escapeHtml(message)}</div>`;
        }

        function createTable(headers, rows) {
            if (!rows || rows.length === 0) {
                return '<div class="alert alert-info">No data found.</div>';
            }

            let html = '<table class="table table-dark table-striped table-hover">';
            html += '<thead><tr>';
            headers.forEach(h => {
                html += `<th>${h}</th>`;
            });
            html += '</tr></thead><tbody>';

            rows.forEach(row => {
                html += '<tr>';
                headers.forEach(h => {
                    let val = row[h];
                    if (typeof val === 'number') {
                        // Format floats nicely
                        val = val.toFixed(4);
                        if (val.endsWith('0000')) val = parseInt(val);
                        else if (val.endsWith('00')) val = parseFloat(val).toFixed(2);
                    }
                    html += `<td>${escapeHtml(val)}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            return html;
        }

        async function fetchTweets() {
            const ceo = document.getElementById('ceoHandle').value.trim();
            if (!ceo) {
                displayError("Please enter a CEO Twitter Handle.");
                return;
            }

            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/tweets/${encodeURIComponent(ceo)}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();

                if (data.status === 'error') throw new Error(data.message);

                const container = document.getElementById('resultsContainer');
                container.innerHTML = `<h3 class="mb-3">Tweets for @${escapeHtml(ceo)}</h3>` +
                    createTable(['ceo', 'date', 'text', 'sentiment'], data.data);
            } catch (e) {
                displayError("Failed to fetch tweets: " + e.message);
            } finally {
                showLoading(false);
            }
        }

        async function fetchStocks() {
            const ticker = document.getElementById('stockTicker').value.trim();
            if (!ticker) {
                displayError("Please enter a Stock Ticker.");
                return;
            }

            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/stocks/${encodeURIComponent(ticker)}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();

                if (data.status === 'error') throw new Error(data.message);

                const container = document.getElementById('resultsContainer');
                container.innerHTML = `<h3 class="mb-3">Stock Data for ${escapeHtml(ticker.toUpperCase())}</h3>` +
                    createTable(['timestamp', 'open', 'high', 'low', 'close', 'volume', 'trade_count', 'vwap'], data.data);
            } catch (e) {
                displayError("Failed to fetch stock data: " + e.message);
            } finally {
                showLoading(false);
            }
        }

        async function fetchMerged() {
            const ceo = document.getElementById('ceoHandle').value.trim();
            const ticker = document.getElementById('stockTicker').value.trim();

            if (!ceo || !ticker) {
                displayError("Please enter both CEO Twitter Handle and Stock Ticker for merged data.");
                return;
            }

            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/merged/${encodeURIComponent(ceo)}/${encodeURIComponent(ticker)}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();

                if (data.status === 'error') throw new Error(data.message);

                const container = document.getElementById('resultsContainer');
                container.innerHTML = `<h3 class="mb-3">Merged Data (@${escapeHtml(ceo)} & ${escapeHtml(ticker.toUpperCase())})</h3>` +
                    createTable([
                        'date', 'ceo', 'tweet_text', 'sentiment_score', 'refined_sentiment',
                        'tone_category', 'tweet_type', 'stock_close', 'stock_volume', 'stock_open_close_diff'
                    ], data.data);
            } catch (e) {
                displayError("Failed to fetch merged data: " + e.message);
            } finally {
                showLoading(false);
            }
        }
    </script>
</body>
</html>
